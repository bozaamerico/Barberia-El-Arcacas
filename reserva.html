    <section id="reserva">
        <h2>Hacer una Cita</h2>
        <form action="/reservar" method="POST">
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Su nombre" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="persona@gmail.com" required>

            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha" name="fecha" required>

            <label for="hora">Hora:</label>
            <select id="hora" name="hora">
                <option value="12:00">12:00 PM</option>
                <option value="13:00">1:00 PM</option>
                <option value="14:00">2:00 PM</option>
                <option value="19:00">7:00 PM</option>
                <option value="20:00">8:00 PM</option>
            </select>

            <button type="submit" class="btn-reserva">Confirmar Cita</button>
        </form>
    </section>

    <footer id="contacto">
        <p><strong class="footer-nombre">Barberia El Arcacas</strong></p>

        </p>
